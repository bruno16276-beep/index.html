<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login BESS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.login-box {
  background: #1e293b;
  padding: 40px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login BESS ⚡</h2>

  <input type="email" id="email" placeholder="Seu email">
  <input type="password" id="senha" placeholder="Sua senha">

  <button onclick="login()">Entrar</button>

  <p id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  'https://rxmfafapkmyvswdeaxgu.supabase.co',
  'sb_publishable_Q0wAaL6_2GrES9DxyFLqSQ_Yy91KZnI'
)

async function login() {
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  })

  if (error) {
    document.getElementById('status').innerText = "Email ou senha inválidos"
    return
  }

  const { data: userData, error: userError } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('email', email)
    .single()

  if (userError || !userData) {
    document.getElementById('status').innerText = "Usuário não encontrado"
    return
  }

  if (!userData.ativo) {
    document.getElementById('status').innerText = "Acesso desativado"
    return
  }

  if (userData.expira_em && new Date(userData.expira_em) < new Date()) {
    document.getElementById('status').innerText = "Acesso expirado"
    return
  }

  document.getElementById('status').innerText = "Login OK ✅"
}
</script>

</body>
</html>

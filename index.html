<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login BESS</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Seu email"><br><br>
<input type="password" id="senha" placeholder="Sua senha"><br><br>

<button onclick="login()">Entrar</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  'https://rxmfafapkmyvswdeaxgu.supabase.co',
  'sb_publishable_Q0wAaL6_2GrES9DxyFLqSQ_Yy91KZnI'
)

async function login() {
  const email = document.getElementById('email').value
  const senha = document.getElementById('senha').value

  // LOGIN REAL (AUTH)
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: senha
  })

  if (error) {
    document.getElementById('status').innerText = "Email ou senha inválidos"
    return
  }

  // CONSULTA COM RLS
  const { data: userData, error: userError } = await supabaseClient
    .from('usuarios')
    .select('*')
    .eq('email', email)
    .single()

  if (userError || !userData) {
    document.getElementById('status').innerText = "Usuário não encontrado"
    return
  }

  if (!userData.ativo) {
    document.getElementById('status').innerText = "Acesso desativado"
    return
  }

  if (userData.expira_em && new Date(userData.expira_em) < new Date()) {
    document.getElementById('status').innerText = "Acesso expirado"
    return
  }

  document.getElementById('status').innerText = "Login OK ✅"
}
</script>

</body>
</html>
